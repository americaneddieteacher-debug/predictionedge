<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>용병단연대기 — 다크 판타지 용병단 경영 RPG</title>
<meta name="description" content="계약, 전투, 그리고 생존. 이름 없는 용병단을 대륙 최고의 전설로 이끌어라. 브라우저에서 바로 즐기는 용병단 경영 턴제 RPG.">
<meta property="og:title" content="용병단연대기 — Chronicles of the Free Company">
<meta property="og:description" content="용병을 모으고, 의뢰를 완수하고, 검은 군단을 막아라. 유물·회차·유산 시스템으로 매 회차가 다른 캠페인.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
/* ============ 디자인 토큰 ============ */
:root{
  --bg:#0e0c09; --bg2:#14110d; --panel:#1c1813; --panel2:#252017; --panel3:#2e2820;
  --line:#3b3226; --line2:#4d4232;
  --ink:#ece0c8; --ink-dim:#c9bb9e; --muted:#98876c; --faint:#6e6250;
  --gold:#d9a83c; --gold-soft:#f0cd7e; --gold-dim:#8a6f2e;
  --red:#c8524a; --red-soft:#e8837b; --green:#8aab5e; --blue:#7fa7cd; --purple:#a98bc9;
  --hp:#b8503f; --hp-bg:#3a1f1a;
  --shadow:0 10px 30px rgba(0,0,0,.55);
  --radius:12px;
  --serif:"Iowan Old Style","Palatino Linotype","Noto Serif KR","Nanum Myeongjo",Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard","Noto Sans KR",Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.6 var(--sans);
  word-break:keep-all;overflow-wrap:break-word;
  background-image:
    radial-gradient(1200px 600px at 50% -10%, rgba(217,168,60,.05), transparent 60%),
    radial-gradient(900px 500px at 90% 110%, rgba(200,82,74,.04), transparent 60%);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.serif{font-family:var(--serif)}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
::selection{background:rgba(217,168,60,.3)}

/* ============ 공통 컴포넌트 ============ */
#app{max-width:980px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;animation:fadeIn .35s ease}
.screen.on{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--panel3);color:var(--ink);border:1px solid var(--line2);
  border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;
  transition:transform .06s ease, background .15s ease, border-color .15s ease;
}
.btn:hover{background:#37301f;border-color:var(--gold-dim)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn.gold{background:linear-gradient(180deg,#e3b44a,#b8862b);color:#241a06;border-color:#f0cd7e;font-weight:800;text-shadow:0 1px 0 rgba(255,255,255,.25)}
.btn.gold:hover{filter:brightness(1.07)}
.btn.red{background:linear-gradient(180deg,#a8443d,#7e2f2a);border-color:#c8746e;color:#ffe9e6}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 12px;font-size:12.5px;border-radius:8px}
.btn.block{width:100%}
.panel{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.gold-text{color:var(--gold)}
.red-text{color:var(--red-soft)}
.green-text{color:var(--green)}
.muted{color:var(--muted)}

/* HP 바 */
.bar{height:8px;background:var(--hp-bg);border-radius:99px;overflow:hidden;border:1px solid rgba(0,0,0,.4)}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#d06a4c,var(--hp));border-radius:99px;transition:width .35s ease}
.bar.xp>i{background:linear-gradient(90deg,#c9a743,#8a6f2e)}
.bar.xp{background:#2b2517}

/* ============ 타이틀 화면 ============ */
#screen-title{align-items:center;justify-content:center;text-align:center;padding:24px}
.title-emblem{font-size:56px;filter:drop-shadow(0 6px 18px rgba(217,168,60,.35));margin-bottom:6px}
.title-tag{font-size:11px;letter-spacing:.42em;color:var(--gold-dim);text-transform:uppercase;margin:0 0 10px;font-weight:700}
#screen-title h1{
  font-size:64px;line-height:1.05;margin:0 0 14px;font-weight:800;letter-spacing:.02em;
  background:linear-gradient(180deg,#f4e3b6 20%,var(--gold) 55%,#8a6f2e);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 18px 50px rgba(217,168,60,.15);
}
#screen-title h1 small{display:block;font-size:20px;letter-spacing:.55em;color:var(--muted);-webkit-text-fill-color:var(--muted);margin-top:6px;font-weight:600}
.title-sub{color:var(--ink-dim);max-width:46ch;margin:0 auto 26px;font-size:15.5px}
.title-form{display:flex;flex-direction:column;gap:12px;width:min(340px,88vw);margin:0 auto}
.title-form input{
  background:var(--panel);border:1px solid var(--line2);color:var(--ink);border-radius:10px;
  padding:12px 16px;font-size:15px;text-align:center;outline:none;
}
.title-form input:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(217,168,60,.12)}
.title-foot{margin-top:30px;font-size:12px;color:var(--faint)}
.title-meta{margin-top:16px;font-size:12.5px;color:var(--gold-dim);font-weight:700}

/* ============ 상단바 & 탭 ============ */
#topbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:14px 18px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(28,24,19,.9),rgba(20,17,13,.6));
  position:sticky;top:0;z-index:20;backdrop-filter:blur(6px);
}
#companyTitle{font-family:var(--serif);font-size:18px;font-weight:800;color:var(--gold-soft);letter-spacing:.02em;margin-right:auto}
#companyTitle small{display:block;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.14em;font-family:var(--sans)}
.res{display:flex;align-items:center;gap:6px;font-weight:700;font-size:14px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 13px}
.res b{font-weight:800}
.icon-btn{background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);border-radius:999px;width:34px;height:34px;font-size:15px;display:inline-flex;align-items:center;justify-content:center}
.icon-btn:hover{border-color:var(--gold-dim)}
.icon-btn.off{opacity:.4}
#tabs{display:flex;gap:2px;padding:10px 14px 0;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{
  background:transparent;border:0;color:var(--muted);font-size:13.5px;font-weight:700;
  padding:10px 13px 12px;border-bottom:2px solid transparent;white-space:nowrap;position:relative;
}
.tab:hover{color:var(--ink-dim)}
.tab.on{color:var(--gold-soft);border-bottom-color:var(--gold)}
.tab .dot{position:absolute;top:8px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red)}
#hub-content{padding:20px 18px 30px;flex:1}
#hub-actions{position:sticky;bottom:0;padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(0deg,var(--bg) 55%,transparent);display:flex;gap:10px;justify-content:flex-end}

/* ============ 카드 그리드 ============ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{padding:16px;position:relative}
.card h3{margin:0;font-size:16.5px;color:var(--ink)}
.merc-top{display:flex;gap:12px;align-items:center;margin-bottom:10px}
.merc-face{
  width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:28px;background:radial-gradient(circle at 30% 25%,var(--panel3),#151209);
  border:1px solid var(--line2);flex-shrink:0;
}
.merc-cls{font-size:12px;color:var(--muted);font-weight:600}
.trait{font-size:11.5px;color:var(--purple);font-weight:700}
.stat-row{display:flex;gap:10px;font-size:12.5px;color:var(--ink-dim);margin:8px 0 4px;flex-wrap:wrap}
.stat-row b{color:var(--ink)}
.equip-row{display:flex;gap:6px;margin-top:8px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
.equip-chip{border:1px dashed var(--line2);border-radius:8px;padding:2px 8px}
.equip-chip.filled{border-style:solid;color:var(--gold-soft);border-color:var(--gold-dim)}
.card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.injury-badge{position:absolute;top:12px;right:12px;font-size:11px;font-weight:800;color:#ffb0a8;background:#4a201c;border:1px solid #7e2f2a;padding:3px 9px;border-radius:999px}
.lvl-badge{font-size:11px;font-weight:800;color:var(--gold-soft);background:#2e2510;border:1px solid var(--gold-dim);padding:2px 8px;border-radius:999px}
.row-badge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;border:1px solid var(--line2);color:var(--ink-dim);background:var(--panel)}
.row-badge.front{color:#e8b7a2;border-color:#7e4a3a}
.row-badge.back{color:#a9c4e0;border-color:#3a5a7e}

/* 의뢰 카드 */
.stars{color:var(--gold);letter-spacing:2px;font-size:13px}
.contract-final{border-color:var(--gold-dim);background:linear-gradient(180deg,#2c2410,var(--panel));box-shadow:0 0 24px rgba(217,168,60,.12)}
.enemy-preview{display:flex;gap:4px;font-size:19px;margin:8px 0}
.reward-row{display:flex;gap:14px;font-size:13px;font-weight:700;margin-top:6px}

/* ============ 전투 화면 ============ */
#screen-battle{padding:0 14px 14px}
#battle-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 4px;border-bottom:1px solid var(--line);margin-bottom:8px}
#battle-head h2{margin:0;font-size:18px;color:var(--gold-soft)}
#battle-head .round{font-size:12.5px;color:var(--muted);font-weight:700;margin-right:auto}
.units-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:6px 0;min-height:60px}
.row-label{text-align:center;font-size:10px;letter-spacing:.3em;color:var(--faint);font-weight:800;margin-top:2px}
.unit{
  width:118px;padding:10px 8px 10px;text-align:center;position:relative;
  background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;
  transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease, opacity .3s ease;
}
.unit .uface{font-size:30px;line-height:1.2;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
.unit .uname{font-size:11.5px;font-weight:700;margin:3px 0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unit .uhp{font-size:10.5px;color:var(--muted);margin-top:4px;font-weight:700}
.unit .ustatus{min-height:15px;font-size:10.5px;margin-top:3px;font-weight:800;color:var(--red-soft)}
.unit .intent{
  position:absolute;top:-9px;right:-6px;font-size:13px;background:#33201d;border:1px solid #7e2f2a;
  border-radius:999px;padding:1px 7px;font-weight:800;color:#ffd9d4;box-shadow:var(--shadow);
}
.unit .ranged-mark{position:absolute;top:-9px;left:-4px;font-size:10px;background:#1d2833;border:1px solid #3a5a7e;border-radius:999px;padding:1px 7px;font-weight:800;color:#a9c4e0}
.unit.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(217,168,60,.35),0 6px 20px rgba(217,168,60,.15);transform:translateY(-4px)}
.unit.dead{opacity:.28;filter:grayscale(1)}
.unit.targetable{cursor:pointer;border-color:var(--red);animation:pulse 1s infinite}
.unit.targetable:hover{transform:scale(1.06)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,82,74,.4)}50%{box-shadow:0 0 0 5px rgba(200,82,74,.12)}}
.unit.hit{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
.float-dmg{
  position:absolute;left:50%;top:8px;transform:translateX(-50%);font-weight:900;font-size:17px;color:#ffd9d4;
  text-shadow:0 2px 6px rgba(0,0,0,.8);pointer-events:none;animation:floatUp 1s ease forwards;z-index:5;white-space:nowrap;
}
.float-dmg.crit{color:#ffcf4d;font-size:20px}
.float-dmg.heal{color:#a9e08a}
.float-dmg.dot{color:#c9a0e8;font-size:14px}
@keyframes floatUp{0%{opacity:0;transform:translate(-50%,6px)}15%{opacity:1}100%{opacity:0;transform:translate(-50%,-30px)}}
#battle-mid{display:flex;flex-direction:column;align-items:center;gap:8px;padding:6px 0 4px}
#turn-label{font-size:13px;font-weight:800;color:var(--gold-soft);min-height:20px;font-family:var(--serif);letter-spacing:.04em}
#action-bar{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;min-height:40px}
#battle-log{
  margin-top:8px;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:10px;
  padding:10px 14px;height:118px;overflow-y:auto;font-size:12.5px;line-height:1.75;color:var(--ink-dim);
}
#battle-log .turn-sep{color:var(--faint);font-size:11px;letter-spacing:.1em}
#battle-log .em{color:var(--gold-soft);font-weight:700}
#battle-log .bad{color:var(--red-soft)}
#battle-log .good{color:var(--green)}
.vs-divider{display:flex;align-items:center;gap:12px;color:var(--faint);font-size:11px;letter-spacing:.3em;font-weight:800;margin:2px 0}
.vs-divider::before,.vs-divider::after{content:"";flex:1;height:1px;background:var(--line)}

/* ============ 결과/엔딩 ============ */
#screen-result,#screen-ending{align-items:center;justify-content:center;text-align:center;padding:30px 20px}
.result-box{width:min(560px,94vw);padding:34px 28px}
.result-box h2{font-size:30px;margin:0 0 4px}
.result-box .sub{color:var(--muted);margin:0 0 20px;font-size:13.5px}
.result-list{text-align:left;margin:18px 0;font-size:14px;padding:0}
.result-list li{margin:7px 0;list-style:none;padding-left:22px;position:relative}
.result-list li::before{content:"◆";position:absolute;left:0;color:var(--gold-dim);font-size:10px;top:5px}
.victory h2{color:var(--gold-soft)}
.defeat h2{color:var(--red-soft)}
.ending-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:22px 0;text-align:left}
.ending-stats .panel{padding:12px 16px}
.ending-stats b{display:block;font-size:20px;color:var(--gold-soft);font-family:var(--serif)}
.ending-stats span{font-size:11.5px;color:var(--muted);font-weight:700;letter-spacing:.06em}

/* ============ 연대기/기록/본부 ============ */
.chron{max-width:640px;margin:0 auto}
.chron-entry{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid rgba(59,50,38,.5);font-size:13.5px}
.chron-day{flex-shrink:0;width:52px;color:var(--faint);font-weight:800;font-size:12px;text-align:right;padding-top:2px}
.chron-entry.story{background:linear-gradient(90deg,rgba(217,168,60,.06),transparent);border-radius:8px;padding:12px 10px;margin:10px 0;border:1px solid rgba(217,168,60,.18)}
.chron-entry.story .chron-text{font-family:var(--serif);color:var(--ink)}
.chron-entry.story h4{margin:0 0 4px;color:var(--gold-soft);font-size:14.5px}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ach{display:flex;gap:10px;align-items:center;padding:10px 12px;font-size:12.5px}
.ach .a-icon{font-size:22px;width:34px;text-align:center}
.ach b{display:block;font-size:13px}
.ach.locked{opacity:.35;filter:grayscale(.8)}
.codex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.codex-card{padding:10px;text-align:center;font-size:12px}
.codex-card .c-icon{font-size:26px}
.codex-card.unknown{opacity:.35}
.relic-strip{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
.relic-chip{display:inline-flex;gap:6px;align-items:center;font-size:12px;font-weight:700;background:#2b2415;border:1px solid var(--gold-dim);color:var(--gold-soft);border-radius:999px;padding:4px 11px}
.hq-cost{font-size:12.5px;font-weight:800;color:var(--purple)}

/* ============ 모달/토스트 ============ */
#modal-root{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:18px}
#modal-root.on{display:flex}
#modal-root .backdrop{position:absolute;inset:0;background:rgba(5,4,2,.72);backdrop-filter:blur(3px);animation:fadeIn .2s}
.modal{
  position:relative;width:min(480px,94vw);max-height:86dvh;overflow-y:auto;
  background:linear-gradient(180deg,var(--panel3),var(--panel));border:1px solid var(--line2);
  border-radius:16px;padding:24px 22px;box-shadow:var(--shadow);animation:modalIn .25s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.modal h3{margin:0 0 6px;font-size:19px;color:var(--gold-soft)}
.modal .modal-sub{color:var(--muted);font-size:13px;margin:0 0 16px}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions .btn{flex:1}
.pick-list{display:flex;flex-direction:column;gap:8px}
.pick-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);
  border-radius:10px;background:var(--panel);cursor:pointer;transition:border-color .15s;text-align:left;color:var(--ink);font-size:13.5px;width:100%;
}
.pick-item:hover{border-color:var(--gold-dim)}
.pick-item.selected{border-color:var(--gold);background:#2b240f}
.pick-item .pi-face{font-size:22px}
.pick-item .pi-meta{font-size:11.5px;color:var(--muted)}
.pick-item:disabled{opacity:.45;cursor:not-allowed}
.pick-item .row-chip{
  margin-left:auto;flex-shrink:0;font-size:11px;font-weight:800;border-radius:999px;padding:3px 10px;
  border:1px solid var(--line2);background:var(--panel2);color:var(--ink-dim);cursor:pointer;
}
.pick-item .row-chip:hover{border-color:var(--gold-dim)}
#toast-root{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:max-content;max-width:92vw}
.toast{
  background:#2b2517;border:1px solid var(--gold-dim);color:var(--ink);font-size:13px;font-weight:700;
  padding:10px 18px;border-radius:999px;box-shadow:var(--shadow);animation:toastIn .25s ease;text-align:center;
}
.toast.bad{border-color:#7e2f2a;background:#33201d;color:#ffd9d4}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.empty-note{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px}
.section-title{display:flex;align-items:baseline;gap:10px;margin:4px 0 14px;flex-wrap:wrap}
.section-title h2{margin:0;font-size:19px;color:var(--ink)}
.section-title .muted{font-size:12.5px}

@media (max-width:620px){
  #screen-title h1{font-size:44px}
  .grid{grid-template-columns:1fr}
  .unit{width:92px;padding:8px 6px}
  .unit .uface{font-size:24px}
  #companyTitle{width:100%}
  .ending-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app">

  <!-- ======== 타이틀 ======== -->
  <section id="screen-title" class="screen">
    <div class="title-emblem">⚔️</div>
    <p class="title-tag">Chronicles of the Free Company</p>
    <h1>용병단연대기<small>傭 兵 團 年 代 記</small></h1>

const $ = s => document.querySelector(s);

const rnd = n => Math.floor(Math.random() * n);

let audioCtx = null;
function getCtx(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }

const SFX = (() => {
  let on = true;
  function tone(freq, dur, type, vol, delay=0){
    if(!on) return;
    const ctx = getCtx(); if(!ctx) return;
    try{
      const t = ctx.currentTime + delay;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type; o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(t + dur + .02);
    }catch(e){}
  }
  return {
    get on(){ return on; }, set on(v){ on = v; }, toggle(){ on = !on; return on; },
    click(){ tone(660, .07, 'triangle', .12); },
    hit(){ tone(160, .12, 'sawtooth', .16); tone(90, .16, 'square', .1, .02); },
    crit(){ tone(220, .1, 'sawtooth', .2); tone(440, .14, 'square', .14, .05); },
    heal(){ tone(520, .12, 'sine', .14); tone(780, .18, 'sine', .12, .09); },
    coin(){ tone(880, .08, 'triangle', .13); tone(1320, .1, 'triangle', .1, .06); },
    win(){ [523,659,784,1047].forEach((f,i)=>tone(f, .22, 'triangle', .14, i*.13)); },
    lose(){ [330,262,196].forEach((f,i)=>tone(f, .3, 'sawtooth', .12, i*.18)); },
    levelup(){ [659,784,988,1319].forEach((f,i)=>tone(f, .16, 'square', .1, i*.09)); },
  };
})();

/* 다크 앰비언트 BGM (신스 드론 + 펜타토닉 종소리) */
const BGM = (() => {
  let playing = false, nodes = [], timer = null;
  const NOTES = [110, 130.8, 146.8, 164.8, 196, 220];
  function start(){
    if(playing) return;
    const ctx = getCtx(); if(!ctx) return;
    try{
      playing = true;
      const master = ctx.createGain(); master.gain.value = .55; master.connect(ctx.destination);
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 320; lp.connect(master);
      [[55,'sawtooth',.028],[110,'sawtooth',.022],[164.8,'triangle',.015]].forEach(([f,t,v])=>{
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = t; o.frequency.value = f; g.gain.value = v;
        o.connect(g); g.connect(lp); o.start();
        nodes.push(o,g);
      });
      nodes.push(master, lp);
      timer = setInterval(()=>{
        if(!playing) return;
        try{
          const t = ctx.currentTime;
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = 'sine'; o.frequency.value = pick(NOTES) * (Math.random()<0.4?2:1);
          g.gain.setValueAtTime(.045, t);
          g.gain.exponentialRampToValueAtTime(.0008, t + 2.4);
          o.connect(g); g.connect(master);
          o.start(t); o.stop(t + 2.5);
        }catch(e){}
      }, 2600);
    }catch(e){ playing = false; }
  }
  function stop(){
    playing = false;
    if(timer){ clearInterval(timer); timer = null; }
    nodes.forEach(n=>{ try{ n.stop ? n.stop() : n.disconnect(); }catch(e){} });
    nodes = [];
  }
  return { get on(){ return playing; }, start, stop, toggle(){ playing ? stop() : start(); return playing; } };
})();

const META_KEY = 'mercChronicleMeta_v1';
let M = loadMeta();
function loadMeta(){
  try{
    const raw = localStorage.getItem(META_KEY);
    if(raw){ const m = JSON.parse(raw); if(m && m.up) return m; }
  }catch(e){}
  return { legacy:0, up:{train:0,medic:0,vault:0,tavern:0}, ach:{}, codex:{}, kills:0, runs:0, endings:0, bgm:true, sfx:true };
}
function saveMeta(){ try{ localStorage.setItem(META_KEY, JSON.stringify(M)); }catch(e){} }
function unlockAch(id){
  if(M.ach[id]) return;
  const a = ACHS.find(x=>x.id===id); if(!a) return;
  M.ach[id] = true; saveMeta();
  toast(`🏆 업적 달성 — ${a.name}`);

  };
}
function hasChal(id){ return S && S.challenges.includes(id); }

/* ---------- 유물 효과 집계 ---------- */
let _relicCache = { key:null, val:null };
function relicMods(){
  const key = S ? S.relics.join(',') : '';
  if(_relicCache.key === key) return _relicCache.val;
  const mods = { atkMul:0, def:0, spd:0, crit:0, goldMul:0, expMul:0, repMul:0, foodSave:0, potion:0, morningHeal:0 };
  if(S) S.relics.forEach(id=>{
    const r = RELICS.find(x=>x.id===id); if(!r) return;
    Object.keys(mods).forEach(k=>{ if(r[k]) mods[k]+=r[k]; });
  });
  _relicCache = { key, val:mods };
  return mods;
}

/* ---------- 용병 ---------- */
function makeMerc(cls, lvl=1){
  const m = { id:mercSeq++, name:pick(NAMES), cls, lvl, exp:0, row:CLASSES[cls].row,
    trait:rnd(4)===0?null:pick(TRAITS), weapon:null, armor:null, injury:0, hp:0 };
  if(S){ let guard=0; while(S.roster.concat(S.candidates).some(x=>x!==m&&x.name===m.name)&&guard++<40) m.name=pick(NAMES); }
  m.hp = mercStats(m).hp;
  return m;
}
function mercStats(m){
  const c = CLASSES[m.cls], g = c.growth, L = m.lvl-1, t = m.trait||{}, R = relicMods();
  let hp  = Math.round((c.hp + g.hp*L) * (t.hpMul||1));
  let atk = Math.round((c.atk + g.atk*L) * (t.atkMul||1) * (1+R.atkMul)) + (m.weapon?m.weapon.atk:0);
  let def = Math.round(c.def + g.def*L) + (t.def||0) + (m.armor?m.armor.def:0) + R.def;
  let spd = Math.round(c.spd + g.spd*L) + (t.spd||0) + R.spd;
  let crit = 5 + (m.cls==='rogue'?10:0) + (t.crit||0) + R.crit;
  return { hp, atk, def, spd, crit };
}
function expNeed(lvl){ return 30 + lvl*25; }
function gainExp(m, amount){
  if(m.lvl>=10) return [];
  const t=m.trait||{};
  m.exp += Math.round(amount * (t.expMul||1));
  const ups=[];
  while(m.lvl<10 && m.exp>=expNeed(m.lvl)){
    m.exp-=expNeed(m.lvl);
    const oldHp=mercStats(m).hp;
    m.lvl++;
    m.hp=clamp(m.hp+(mercStats(m).hp-oldHp), 1, mercStats(m).hp);
    ups.push(m.lvl);
  }
  return ups;
}
function mercWage(m){ return CLASSES[m.cls].wage + (m.lvl-1); }
function mercFood(m){ return (m.trait&&m.trait.food)||1; }
function hireCost(m){ return 50 + (m.lvl-1)*45 + 10*rnd(4); }

/* ---------- 의뢰 ---------- */
let contractSeq = 1;
function genContracts(){
  const reg = curRegion();
  let avail = CONTRACT_TIERS.filter(t=>S.rep>=t.minRep && t.tier>=reg.tiers[0] && t.tier<=reg.tiers[1]);
  if(!avail.length) avail = [CONTRACT_TIERS.find(t=>t.tier===reg.tiers[0])];
  const list = [];
  const topTier = avail[avail.length-1];
  const count = 3 + rnd(2);
  const R = relicMods();
  for(let i=0;i<count;i++){
    const t = i===0 ? topTier : pick(avail);
    const tpl = pick(t.templates);
    const enemies = tpl.enemies.slice();
    const sum = enemies.reduce((a,k)=>a+ENEMIES[k].gold,0);
    const exp = enemies.reduce((a,k)=>a+ENEMIES[k].exp,0);
    let reward = Math.round((30 + sum*2 * (0.9+Math.random()*0.3))/5)*5;
    if(hasChal('austere')) reward = Math.round(reward*0.7);
    let repGain = t.tier*3 + rnd(3), expGain = exp, mod = null;
    if(Math.random()<0.25){
      mod = pick(CONTRACT_MODS);
      if(mod.goldMul) reward = Math.round(reward*mod.goldMul/5)*5;
      if(mod.repMul) repGain = Math.round(repGain*mod.repMul);
      if(mod.expMul) expGain = Math.round(expGain*mod.expMul);
    }
    list.push({
      id:contractSeq++, tier:t.tier, name:tpl.name, place:tpl.place, enemies,
      reward, rep: repGain, exp: expGain, mod,
    });
  }
  // 자유 모드: 잔당 토벌 (무한 도전 — 단계마다 강해진다)
  if(S.won){
    const wave = (S.raidWave||0)+1;
    const pools = [['darkKnight','wraith','wraith'],['ogre','cultist','wraith'],['orcChief','darkKnight','cultist'],['darkKnight','darkKnight','cultist','wraith']];
    let reward = 150 + wave*60;
    if(hasChal('austere')) reward = Math.round(reward*0.7);
    list.unshift({
      id:contractSeq++, tier:5, raid:wave, scale:1+wave*0.12,
      name:`검은 군단 잔당 토벌 — ${wave}단계`, place:'북부 폐허',
      enemies: pools[(wave-1)%pools.length],
      reward, rep:10+wave, exp:130+wave*30,
      desc:`잔당은 단계마다 강해진다. (적 능력치 +${Math.round(wave*12)}%)`,
    });
  }
  S.contracts = list;
  if(S.finalUnlocked && !S.won){
    const sum = FINAL_CONTRACT.enemies.reduce((a,k)=>a+ENEMIES[k].gold,0);
    let reward = 30+sum*2;
    if(hasChal('austere')) reward = Math.round(reward*0.7);
    S.contracts.unshift({ ...FINAL_CONTRACT, id:'FINAL', reward, rep:30,
      exp:FINAL_CONTRACT.enemies.reduce((a,k)=>a+ENEMIES[k].exp,0) });
  }
}

/* ---------- 연대기 ---------- */
function chron(text, story){ S.chron.unshift({ day:S.day, text, story:story||null }); }
function checkStory(){
  STORY.forEach(ch=>{
    if(S.rep>=ch.rep && !S.storySeen.includes(ch.title)){
      S.storySeen.push(ch.title);
      chron(ch.text, ch.title);
      if(ch.unlock==='final'){ S.finalUnlocked=true; genContracts(); }
      if(ch.rep>0){
        openModal(`
          <h3>📖 ${ch.title}</h3>
          <p style="font-family:var(--serif);line-height:1.85;color:var(--ink-dim)">${ch.text}</p>
          ${ch.unlock==='final'?'<p class="gold-text" style="font-weight:800">⚑ 최종 의뢰가 의뢰판에 게시되었다.</p>':''}
          <div class="modal-actions"><button class="btn gold" onclick="G.closeModal()">계속</button></div>`);
      }
    }
  });
}
function addRep(n){
  if(n>0){ const R=relicMods(); n = Math.round(n*(1+R.repMul)); }
  S.rep=Math.max(0,S.rep+n); checkStory();
}

/* ---------- 저장/불러오기 ---------- */
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(!s || !Array.isArray(s.roster)) return null;
    if(s.v===1){ // v1 → v2 마이그레이션
      s.v=2; s.relics=[]; s.challenges=[];
      s.roster.concat(s.candidates||[]).forEach(m=>{ if(!m.row) m.row=CLASSES[m.cls].row; });
    }
    if(s.v!==2) return null;
    if(s.raidWave==null) s.raidWave=0;
    mercSeq = Math.max(1,...s.roster.concat(s.candidates||[]).map(m=>m.id+1), 1);
    contractSeq = Math.max(1,...(s.contracts||[]).filter(c=>c.id!=='FINAL').map(c=>c.id+1), 1);
    return s;
  }catch(e){ return null; }
}

function genCandidates(){
  const n = 2 + rnd(2) + M.up.tavern;
  S.candidates = [];
  const maxLvl = clamp(1+Math.floor(S.rep/18), 1, 5);
  for(let i=0;i<n;i++){
    const m = makeMerc(pick(CLASS_KEYS), Math.min(10, 1+rnd(maxLvl)+M.up.train));
    m.cost = hireCost(m);
    S.candidates.push(m);
  }
}

/* =====================================================================
   전투 엔진 v2 — 전열/후열 · 상태이상 · 적 의도
   ===================================================================== */
function dly(ms){ return (B && B.fast) ? Math.round(ms*0.42) : ms; }
function hasStatus(u,type){ return u.statuses.some(s=>s.type===type); }
function statusPower(u,type){ const s=u.statuses.find(x=>x.type===type); return s?s.power:0; }
function addStatus(u,type,turns,power){
  const ex = u.statuses.find(s=>s.type===type);
  if(ex){ ex.turns=Math.max(ex.turns,turns); ex.power=Math.max(ex.power,power||0); }
  else u.statuses.push({type,turns,power:power||0});
}
function decStatuses(u){
  u.statuses.forEach(s=>s.turns--);
  u.statuses = u.statuses.filter(s=>s.turns>0);
}
const STATUS_ICONS = { bleed:'🩸', poison:'☠️', stun:'💫', taunt:'🛡', sunder:'🔻', rage:'🔥' };
function statusChips(u){
  return u.statuses.map(s=>`${STATUS_ICONS[s.type]||''}${s.turns}`).join(' ');
}

function startBattle(contract, mercIds){
  const units = [];
  mercIds.forEach(id=>{
    const m = S.roster.find(x=>x.id===id); if(!m) return;
    const st = mercStats(m);
    const critBonus = (contract.mod&&contract.mod.crit)||0;
    units.push({ uid:'m'+m.id, side:'party', ref:m, name:m.name, icon:CLASSES[m.cls].icon,
      cls:m.cls, row:m.row, hp:m.hp, maxhp:st.hp, atk:st.atk, def:st.def, spd:st.spd, crit:st.crit+critBonus,
      cds:[0,0], statuses:[], alive:m.hp>0 });
  });
  const counts = {};
  contract.enemies.forEach((k,i)=>{
    const e = ENEMIES[k];
    counts[k]=(counts[k]||0)+1;
    const dup = contract.enemies.filter(x=>x===k).length>1;
    const sc = contract.scale||1, mAtk = (contract.mod&&contract.mod.eAtk)||0,
          mSpd = (contract.mod&&contract.mod.eSpd)||0, mHp = (contract.mod&&contract.mod.eHp)||1;
    const ehp = Math.round(e.hp*sc*mHp), eatk = Math.round(e.atk*sc)+mAtk;
    units.push({ uid:'e'+i, side:'enemy', ekey:k, name:e.name+(dup?' '+counts[k]:''), icon:e.icon,
      hp:ehp, maxhp:ehp, atk:eatk, def:e.def, spd:e.spd+mSpd, crit:5,
      statuses:[], alive:true, boss:!!e.boss, ranged:!!e.ranged, caster:!!e.caster, heavy:!!e.heavy,
      enraged:false, intent:'attack' });
    M.codex[k]=true; // 도감 기록 (조우)
  });
  saveMeta();
  B = { contract, units, round:0, queue:[], qi:-1, active:null, pending:null, over:false,
        auto:false, fast:!!M.fast, logEl:$('#battle-log') };
  $('#battle-title').textContent = (contract.final?'⚑ ':'')+contract.name;
  $('#autoState').textContent = '꺼짐';
  $('#speedState').textContent = B.fast?'2×':'1×';
  $('#battle-log').innerHTML = '';
  blog(`<span class="em">${contract.place}</span> — ${contract.name}. 전투 개시!`, true);
  show('#screen-battle');
  newRound();
}
function blog(html, sep){
  const d = document.createElement('div');
  if(sep) d.className='turn-sep';
  d.innerHTML = html;
  B.logEl.appendChild(d);
  while(B.logEl.children.length > 80) B.logEl.removeChild(B.logEl.firstChild);
  B.logEl.scrollTop = B.logEl.scrollHeight;
}
function alive(side){ return B.units.filter(u=>u.alive && u.side===side); }

function decideIntent(u){
  if(u.boss){
    if(u.hp<=u.maxhp*0.3) return 'enrage';
    if(u.hp<=u.maxhp*0.6 && B.round%2===0) return 'aoe';
    return 'attack';
  }
  if(u.caster && B.round>1 && B.round%3===0) return 'aoe';
  if(u.heavy && Math.random()<0.35) return 'heavy';
  return 'attack';
}
const INTENT_ICONS = { attack:'⚔️', heavy:'💥', aoe:'🌀', enrage:'☠️' };

function newRound(){
  if(B.over) return;
  B.round++;
  $('#battle-round').textContent = `ROUND ${B.round}`;
  if(B.round>1) blog(`— ${B.round}번째 교전 —`, true);
  B.queue = B.units.filter(u=>u.alive).sort((a,b)=> b.spd-a.spd || (a.side==='party'?-1:1));
  B.qi = -1;
  alive('enemy').forEach(u=>{ u.intent = decideIntent(u); });
  nextTurn();
}
function endTurn(delay){
  if(B.active) decStatuses(B.active);
  setTimeout(nextTurn, delay);
}
function nextTurn(){
  if(B.over) return;
  if(checkBattleEnd()) return;
  B.qi++;
  if(B.qi >= B.queue.length){
    B.units.forEach(u=>{ if(u.cds){ u.cds[0]=Math.max(0,u.cds[0]-1); u.cds[1]=Math.max(0,u.cds[1]-1); } });
    return newRound();
  }
  const u = B.queue[B.qi];
  if(!u.alive) return nextTurn();
  B.active = u; B.pending = null;
  // 지속 피해 (출혈/중독)
  const dots = u.statuses.filter(s=>s.type==='bleed'||s.type==='poison');
  for(const s of dots){
    const dmg = s.power;
    u.hp = Math.max(0, u.hp - dmg);
    floatText(u, `${STATUS_ICONS[s.type]}${dmg}`, 'dot');
    blog(`${u.name}이(가) ${s.type==='bleed'?'출혈':'중독'}로 <span class="bad">${dmg}</span> 피해.`);
    if(u.hp<=0){ killUnit(u); syncBattleHp(); renderBattle(); return endTurn(dly(500)); }
  }
  syncBattleHp();
  // 기절
  if(hasStatus(u,'stun')){
    blog(`💫 ${u.name}은(는) 기절해 움직이지 못한다!`);
    renderBattle();
    return endTurn(dly(650));
  }
  renderBattle();
  if(u.side==='enemy') setTimeout(()=>{ if(!B.over) enemyAct(u); }, dly(620));
  else if(B.auto) setTimeout(()=>{ if(!B.over) autoAct(u); }, dly(380));
  /* else: 플레이어 입력 대기 */
}
function unitCard(u){
  const intentBadge = u.side==='enemy' && u.alive ? `<span class="intent" title="다음 행동">${INTENT_ICONS[u.intent]||'⚔️'}</span>` : '';
  const rangedMark = u.side==='enemy' && u.ranged && u.alive ? `<span class="ranged-mark">원거리</span>` : '';
  return `<div class="unit ${u.alive?'':'dead'} ${B.active===u?'active':''}" id="unit-${u.uid}" data-uid="${u.uid}">
    ${intentBadge}${rangedMark}
    <div class="uface">${u.icon}</div>
    <div class="uname">${u.name}</div>
    ${hpBar(u.hp,u.maxhp)}
    <div class="uhp">${u.alive?`${u.hp}/${u.maxhp}`:'전투 불능'}</div>
    <div class="ustatus">${u.alive?statusChips(u):''}</div>
  </div>`;
}
function renderBattle(){
  $('#enemies-row').innerHTML = B.units.filter(u=>u.side==='enemy').map(unitCard).join('');
  $('#party-back').innerHTML  = B.units.filter(u=>u.side==='party'&&u.row==='back').map(unitCard).join('');
  $('#party-front').innerHTML = B.units.filter(u=>u.side==='party'&&u.row==='front').map(unitCard).join('');
  const u = B.active;
  const label = $('#turn-label'), bar = $('#action-bar');
  if(B.over || !u){ label.textContent=''; bar.innerHTML=''; return; }
  if(u.side==='enemy'){
    label.textContent = `${u.name}의 차례…`;
    bar.innerHTML = '';
    return;
  }
  if(B.auto){ label.textContent = `${u.name} — 자동 전투 중`; bar.innerHTML=''; return; }
  const sks = CLASSES[u.cls].skills;
  if(!B.pending){
    label.textContent = `${u.name}의 차례 — 행동을 선택하라`;
    bar.innerHTML = `
      <button class="btn sm" onclick="G.battleAction('attack')">⚔️ 공격</button>
      ${sks.map((sk,i)=>`<button class="btn sm ${u.cds[i]<=0?'gold':''}" ${u.cds[i]<=0?'':'disabled'} onclick="G.battleAction('skill${i}')" title="${sk.desc}">✦ ${sk.name}${u.cds[i]>0?` (${u.cds[i]})`:''}</button>`).join('')}
      <button class="btn sm" ${S.potions>0?'':'disabled'} onclick="G.battleAction('potion')">🧪 물약 (${S.potions})</button>
      <button class="btn sm ghost" onclick="G.battleAction('wait')">⏳ 대기</button>`;
  } else {
    const p = B.pending;
    const targetSide = (p.kind==='heal'||p.kind==='potion') ? 'party' : 'enemy';
    label.textContent = p.kind==='potion' ? '물약을 마실 대상을 선택하라'
      : p.kind==='heal' ? '치유할 아군을 선택하라' : '목표를 선택하라';
    bar.innerHTML = `<button class="btn sm ghost" onclick="G.battleAction('cancel')">↩ 취소</button>`;
    alive(targetSide).forEach(t=>{
      const el = $('#unit-'+t.uid);
      if(el){ el.classList.add('targetable'); el.onclick = ()=>execPlayer(t); }
    });
  }
}
G.battleAction = function(act){
  const u = B.active; if(!u || u.side!=='party' || B.over) return;
  SFX.click();
  if(act==='cancel'){ B.pending=null; return renderBattle(); }
  if(act==='wait'){ blog(`${u.name}은(는) 숨을 고른다.`); return endTurn(dly(300)); }
  if(act==='attack'){ B.pending={kind:'attack'}; return renderBattle(); }
  if(act==='potion'){ if(S.potions<=0) return; B.pending={kind:'potion'}; return renderBattle(); }
  if(act==='skill0'||act==='skill1'){
    const idx = act==='skill0'?0:1;
    if(u.cds[idx]>0) return;
    const sk = CLASSES[u.cls].skills[idx];
    if(sk.type==='heal'){ B.pending={kind:'heal',idx}; return renderBattle(); }
    if(sk.type==='aoe'){ return execAoe(u, idx); }
    if(sk.type==='taunt'){ return execTaunt(u, idx); }
    if(sk.type==='groupheal'){ return execGroupHeal(u, idx); }
    if(sk.type==='rage'){ return execRage(u, idx); }
    B.pending={kind:'skill',idx}; return renderBattle();
  }
};
function execPlayer(target){
  const u = B.active; if(!u||B.over) return;
  const p = B.pending; B.pending = null;
  if(!p) return;
  if(p.kind==='attack') doAttack(u, target, 1, {});
  else if(p.kind==='skill'){
    const sk = CLASSES[u.cls].skills[p.idx];
    u.cds[p.idx] = sk.cd;
    if(sk.type==='strike') doAttack(u, target, sk.mult, {skill:sk.name});
    else if(sk.type==='double'){ doAttack(u, target, sk.mult, {skill:sk.name}); if(target.alive) setTimeout(()=>{ if(!B.over&&target.alive){ doAttack(u,target,sk.mult,{quiet:true}); } }, dly(260)); }
    else if(sk.type==='pierce') doAttack(u, target, sk.mult, {skill:sk.name, pierce:true, critBonus:sk.critBonus||25});
    else if(sk.type==='bleed'){ doAttack(u, target, sk.mult, {skill:sk.name}); if(target.alive){ addStatus(target,'bleed',2,Math.max(2,Math.round(u.atk*0.35))); blog(`${target.name}이(가) <span class="bad">출혈</span>을 입었다!`); } }
    else if(sk.type==='poison'){ doAttack(u, target, sk.mult, {skill:sk.name}); if(target.alive){ addStatus(target,'poison',2,Math.max(2,Math.round(u.atk*0.35))); blog(`${target.name}이(가) <span class="bad">중독</span>되었다!`); } }
    else if(sk.type==='stun'){
      doAttack(u, target, sk.mult, {skill:sk.name});
      if(target.alive){
        if(target.boss) blog(`💫 ...하지만 ${target.name}에게 기절은 통하지 않는다!`);
        else { addStatus(target,'stun',1,0); blog(`${target.name}이(가) <span class="bad">기절</span>했다!`); }
      }
    }
    else if(sk.type==='sunder'){ doAttack(u, target, sk.mult, {skill:sk.name}); if(target.alive){ addStatus(target,'sunder',2,sk.power||3); blog(`${target.name}의 <span class="bad">방어가 무너졌다!</span> (-${sk.power||3})`); } }
    else if(sk.type==='reckless'){
      const cost = Math.max(1, Math.round(u.maxhp*0.12));
      u.hp = Math.max(1, u.hp - cost);
      floatText(u, '-'+cost, 'dot');
      blog(`<span class="em">${u.name}</span>이(가) 피를 바친다! (체력 -${cost})`);
      doAttack(u, target, sk.mult, {skill:sk.name});
    }
  }
  else if(p.kind==='heal'){
    const sk = CLASSES[u.cls].skills[p.idx]; u.cds[p.idx] = sk.cd;
    const amt = Math.round(target.maxhp*sk.mult);
    healUnit(target, amt);
    blog(`<span class="em">${u.name}</span>의 ${sk.name}! ${target.name}이(가) <span class="good">${amt}</span> 회복.`);
  }
  else if(p.kind==='potion'){
    const R = relicMods();
    S.potions--; healUnit(target, 25+R.potion);
    blog(`${u.name}이(가) ${target.name}에게 물약을 먹였다. <span class="good">+${25+R.potion}</span>`);
    SFX.heal();
  }
  renderBattle();
  endTurn(dly(620));
}
function execAoe(u, idx){
  const sk = CLASSES[u.cls].skills[idx];
  u.cds[idx] = sk.cd; B.pending=null;
  blog(`<span class="em">${u.name}</span>의 ${sk.name}이 적진을 휩쓴다!`);
  const targets = alive('enemy');
  targets.forEach((t,i)=> setTimeout(()=>{ if(t.alive&&!B.over) doAttack(u,t,sk.mult,{quiet:true}); }, dly(i*180)));
  setTimeout(()=>{ renderBattle(); }, dly(targets.length*180+100));
  endTurnLater(dly(200 + targets.length*180 + 420));
}
function endTurnLater(delay){
  const act = B.active;
  setTimeout(()=>{ if(B.over) return; if(act) decStatuses(act); nextTurn(); }, delay);
}
function execTaunt(u, idx){
  const sk = CLASSES[u.cls].skills[idx];
  u.cds[idx] = sk.cd; B.pending=null;
  addStatus(u,'taunt',2,sk.power||3);
  blog(`<span class="em">${u.name}</span>의 ${sk.name}! 적들의 시선을 끌어모은다. (방어 +${sk.power||3})`);
  SFX.click();
  renderBattle();
  endTurn(dly(600));
}
function execRage(u, idx){
  const sk = CLASSES[u.cls].skills[idx];
  u.cds[idx] = sk.cd; B.pending=null;
  addStatus(u,'rage',2,sk.power||30);
  blog(`<span class="em">${u.name}</span>의 ${sk.name}! 눈에 핏발이 선다. (공격 +${sk.power||30}%)`);
  SFX.crit();
  renderBattle();
  endTurn(dly(600));
}
function execGroupHeal(u, idx){
  const sk = CLASSES[u.cls].skills[idx];
  u.cds[idx] = sk.cd; B.pending=null;
  blog(`<span class="em">${u.name}</span>의 ${sk.name}이 부대를 감싼다!`);
  alive('party').forEach(t=>{
    const amt = Math.round(t.maxhp*sk.mult);
    t.hp = clamp(t.hp+amt, 1, t.maxhp);
    t.statuses = t.statuses.filter(s=>s.type==='taunt'); // 해로운 효과 해제
    floatText(t, '+'+amt, 'heal');
  });
  SFX.heal();
  syncBattleHp();
  renderBattle();
  endTurn(dly(650));
}
function doAttack(att, tgt, mult, opts){
  if(!tgt.alive) return;
  const critChance = (att.crit||5) + (opts.critBonus||0);
  const crit = Math.random()*100 < critChance;
  const effDef = Math.max(0, (opts.pierce?0:tgt.def) - statusPower(tgt,'sunder')) + (opts.pierce?0:statusPower(tgt,'taunt'));
  let raw = att.atk * (1 + statusPower(att,'rage')/100) * (0.85 + Math.random()*0.3) * mult * (crit?1.5:1);
  let dmg = Math.max(1, Math.round(raw - effDef*0.6));
  tgt.hp = Math.max(0, tgt.hp - dmg);
  crit ? SFX.crit() : SFX.hit();
  floatText(tgt, (crit?'✸ ':'')+dmg, crit?'crit':'');
  const el = $('#unit-'+tgt.uid); if(el) el.classList.add('hit');
  if(!opts.quiet){
    const skillTxt = opts.skill?`의 <span class="em">${opts.skill}</span>`:'의 공격';
    blog(`${att.side==='party'?`<span class="em">${att.name}</span>`:att.name}${skillTxt} → ${tgt.name}에게 <span class="${att.side==='party'?'em':'bad'}">${dmg}</span> 피해${crit?' <span class="bad">치명타!</span>':''}`);
  } else {
    blog(`　↳ ${tgt.name}에게 ${dmg} 피해${crit?' (치명타!)':''}`);
  }
  if(tgt.hp<=0) killUnit(tgt);
  syncBattleHp();
}
function killUnit(u){
  if(!u.alive) return;
  u.alive=false; u.statuses=[];
  blog(u.side==='enemy' ? `<span class="good">${u.name}을(를) 쓰러뜨렸다!</span>` : `<span class="bad">${u.name}이(가) 쓰러졌다!</span>`);
  if(u.side==='enemy'){ S.stats.kills++; M.kills++; }
}
function healUnit(u, amt){
  if(!u.alive) return;
  u.hp = clamp(u.hp+amt, 1, u.maxhp);
  floatText(u, '+'+amt, 'heal');
  SFX.heal();
  syncBattleHp();
}
function floatText(u, text, cls){
  const el = $('#unit-'+u.uid); if(!el) return;
  const f = document.createElement('div');
  f.className = 'float-dmg '+(cls||'');
  f.textContent = text;
  el.appendChild(f);
  setTimeout(()=>f.remove(), 1000);
}
function syncBattleHp(){
  B.units.forEach(u=>{
    const el = $('#unit-'+u.uid); if(!el) return;
    el.classList.toggle('dead', !u.alive);
    const bar = el.querySelector('.bar>i'); if(bar) bar.style.width = clamp(u.hp/u.maxhp*100,0,100)+'%';
    const hp = el.querySelector('.uhp'); if(hp) hp.textContent = u.alive?`${u.hp}/${u.maxhp}`:'전투 불능';
    const stc = el.querySelector('.ustatus'); if(stc) stc.textContent = u.alive?statusChips(u):'';
  });
}
function pickTarget(enemy){
  let pool = alive('party');
  if(!pool.length) return null;
  const taunters = pool.filter(p=>hasStatus(p,'taunt'));
  if(taunters.length) return pick(taunters);
  if(!enemy.ranged){
    const front = pool.filter(p=>p.row==='front');
    if(front.length) pool = front;
  }
  return Math.random()<0.4 ? pool.slice().sort((a,b)=>a.hp-b.hp)[0] : pick(pool);
}
function enemyAct(u){
  if(B.over||!u.alive) return;
  const party = alive('party');
  if(!party.length) return checkBattleEnd() || nextTurn();
  const intent = u.intent || 'attack';
  if(intent==='aoe'){
    blog(`<span class="bad">🌀 ${u.name}의 광역 공격이 부대를 덮친다!</span>`);
    party.forEach((t,i)=> setTimeout(()=>{ if(t.alive&&!B.over) doAttack(u,t,u.boss?0.85:0.6,{quiet:true}); }, dly(i*160)));
    return endTurnLater(dly(200 + party.length*160 + 420));
  }
  let mult = 1;
  if(intent==='heavy') mult = 1.5;
  if(intent==='enrage'){
    mult = 1.6;
    if(!u.enraged){ u.enraged=true; blog(`<span class="bad">☠️ ${u.name}이(가) 암흑의 힘을 해방한다!</span>`); }
  }
  const tgt = pickTarget(u);
  if(tgt) doAttack(u, tgt, mult, {});
  endTurn(dly(560));
}
function autoAct(u){
  if(B.over||!u.alive) return;
  const sks = CLASSES[u.cls].skills;
  const enemies = alive('enemy');
  if(!enemies.length) return checkBattleEnd() || nextTurn();
  const party = alive('party');
  // 위급하면 물약부터 마신다
  if(S.potions>0 && u.hp < u.maxhp*0.35){
    const R = relicMods();
    S.potions--; healUnit(u, 25+R.potion);
    blog(`${u.name}이(가) 급히 물약을 들이켰다. <span class="good">+${25+R.potion}</span>`);
    renderBattle();
    return endTurn(dly(560));
  }
  const lowAlly = party.slice().sort((a,b)=>a.hp/a.maxhp-b.hp/b.maxhp)[0];
  // 성직자: 전체/단일 치유 우선
  if(u.cls==='cleric'){
    const hurt = party.filter(p=>p.hp<p.maxhp*0.65).length;
    if(u.cds[1]<=0 && hurt>=2) return execGroupHeal(u,1);
    if(u.cds[0]<=0 && lowAlly && lowAlly.hp<lowAlly.maxhp*0.6){
      u.cds[0]=sks[0].cd;
      const amt = Math.round(lowAlly.maxhp*sks[0].mult);
      healUnit(lowAlly, amt);
      blog(`<span class="em">${u.name}</span>의 ${sks[0].name}! ${lowAlly.name}이(가) <span class="good">${amt}</span> 회복.`);
      renderBattle();
      return endTurn(dly(560));
    }
  }
  // 전사: 다수전에서 도발
  if(u.cls==='warrior' && u.cds[1]<=0 && enemies.length>=2 && !hasStatus(u,'taunt') && u.row==='front'){
    return execTaunt(u,1);
  }
  // 광전사: 함성 버프
  if(u.cls==='berserker' && u.cds[1]<=0 && !hasStatus(u,'rage')){
    return execRage(u,1);
  }
  const tgt = enemies.slice().sort((a,b)=>a.hp-b.hp)[0];
  // 준비된 공격 스킬 사용
  for(let i=0;i<2;i++){
    const sk = sks[i];
    if(u.cds[i]>0) continue;
    if(sk.type==='heal'||sk.type==='groupheal'||sk.type==='taunt'||sk.type==='rage') continue;
    if(sk.type==='reckless' && u.hp < u.maxhp*0.45) continue;
    if(sk.type==='aoe'){ if(enemies.length>1) return execAoe(u,i); continue; }
    u.cds[i]=sk.cd;
    if(sk.type==='double'){ doAttack(u,tgt,sk.mult,{skill:sk.name}); if(tgt.alive) setTimeout(()=>{ if(!B.over&&tgt.alive) doAttack(u,tgt,sk.mult,{quiet:true}); },dly(240)); }
    else if(sk.type==='pierce') doAttack(u,tgt,sk.mult,{skill:sk.name,pierce:true,critBonus:sk.critBonus||25});
    else if(sk.type==='bleed'){ doAttack(u,tgt,sk.mult,{skill:sk.name}); if(tgt.alive) addStatus(tgt,'bleed',2,Math.max(2,Math.round(u.atk*0.35))); }
    else if(sk.type==='poison'){ doAttack(u,tgt,sk.mult,{skill:sk.name}); if(tgt.alive) addStatus(tgt,'poison',2,Math.max(2,Math.round(u.atk*0.35))); }
    else if(sk.type==='stun'){ doAttack(u,tgt,sk.mult,{skill:sk.name}); if(tgt.alive&&!tgt.boss) addStatus(tgt,'stun',1,0); }
    else if(sk.type==='sunder'){ doAttack(u,tgt,sk.mult,{skill:sk.name}); if(tgt.alive) addStatus(tgt,'sunder',2,sk.power||3); }
    else if(sk.type==='reckless'){ const cost=Math.max(1,Math.round(u.maxhp*0.12)); u.hp=Math.max(1,u.hp-cost); blog(`${u.name}이(가) 피를 바친다! (체력 -${cost})`); doAttack(u,tgt,sk.mult,{skill:sk.name}); }
    else doAttack(u,tgt,sk.mult,{skill:sk.name});
    renderBattle();
    return endTurn(dly(560));
  }
  doAttack(u, tgt, 1, {});
  renderBattle();
  endTurn(dly(560));
}
function checkBattleEnd(){
  if(B.over) return true;
  if(!alive('enemy').length){ B.over=true; setTimeout(()=>endBattle(true), dly(800)); return true; }
  if(!alive('party').length){ B.over=true; setTimeout(()=>endBattle(false), dly(800)); return true; }
  return false;
}
$('#btnSpeed').addEventListener('click', ()=>{
  if(!B) return;
  B.fast = !B.fast;
  M.fast = B.fast; saveMeta();
  $('#speedState').textContent = B.fast?'2×':'1×';

});
$('#btnAuto').addEventListener('click', ()=>{

  B.auto = !B.auto;
  $('#autoState').textContent = B.auto?'켜짐':'꺼짐';

  else renderBattle();
});
$('#btnRetreat').addEventListener('click', ()=>{
  if(!B||B.over) return;
  openModal(`
    <h3>🏳 후퇴</h3>
    <p class="modal-sub">의뢰는 실패하고 명성 -1. 부대는 현재 상태 그대로 귀환한다.</p>
    <div class="modal-actions">
      <button class="btn" onclick="G.closeModal()">계속 싸운다</button>
      <button class="btn red" onclick="G.retreatDo()">후퇴한다</button>
    </div>`);
});
G.retreatDo = function(){
  closeModal();
  if(!B||B.over) return;
  B.over = true;
  endBattle(false, true);
};

/* ---------- 전투 종료/결과 ---------- */
function endBattle(victory, retreat){
  const ct = B.contract;
  const R = relicMods();
  const partyUnits = B.units.filter(u=>u.side==='party');
  const injuredNames = [], deadNames = [];
  partyUnits.forEach(u=>{
    const m = u.ref;
    m.sorties = (m.sorties||0)+1;
    m.hp = u.alive ? u.hp : 0;
    if(!u.alive){
      S.stats.fallen++;
      if(hasChal('iron')){
        deadNames.push(m.name);
        S.roster = S.roster.filter(x=>x!==m);
        chron(`💀 ${m.name}(${CLASSES[m.cls].name} Lv.${m.lvl})이(가) ${ct.place}에서 전사했다. 깃발이 반기로 걸렸다.`);
      } else {
        m.injury = Math.max(1, 2 + rnd(2) - M.up.medic);
        m.hp = 1;
        injuredNames.push(m.name);
      }
    }
  });
  S.stats.battles++;
  const lines = [];
  let levelUps = [];
  if(victory){
    S.stats.wins++;
    let reward = Math.round(ct.reward * (1+R.goldMul));
    if(S.nextRewardBonus){ reward = Math.round(reward*1.5); S.nextRewardBonus=false; lines.push('탈영병의 정보 — 보수 <b class="gold-text">+50%</b>'); }
    S.gold += reward;
    S.stats.goldEarned += reward;
    addRep(ct.rep);
    lines.push(`보수 <b class="gold-text">${fmt(reward)}🪙</b> 획득${R.goldMul?' (유물 보너스 포함)':''}`);
    lines.push(`명성 <b>+${ct.rep}🏅</b>`);
    const expShare = Math.max(8, Math.round(ct.exp * 2.2 / Math.max(1, partyUnits.length) * (1+R.expMul)));
    partyUnits.forEach(u=>{
      if(!S.roster.includes(u.ref)) return; // 전사자는 제외
      const ups = gainExp(u.ref, expShare);
      ups.forEach(lv=>levelUps.push(`${u.ref.name} — Lv.${lv} 달성!`));
    });
    lines.push(`참전 단원 경험치 <b>+${expShare}</b> <span class="muted" style="font-size:12px">(인원수로 분배)</span>`);
    if(ct.raid){
      S.raidWave = ct.raid;
      if((M.bestWave||0) < ct.raid){ M.bestWave = ct.raid; saveMeta(); }
      lines.push(`🌊 잔당 토벌 <b class="gold-text">${ct.raid}단계</b> 달성! (최고 기록 ${M.bestWave}단계)`);
      chron(`검은 군단 잔당 토벌 ${ct.raid}단계를 완수했다.`);
    }
    if(Math.random()<0.3){ S.potions++; lines.push('전리품: 치유 물약 <b>+1🧪</b>'); }
    chron(`「${ct.name}」 의뢰 완수. 보수 ${fmt(reward)}골드.`);
    SFX.win();
  } else {
    addRep(retreat?-1:-3);
    lines.push(retreat?'후퇴 — 명성 <b class="red-text">-1🏅</b>':'의뢰 실패 — 명성 <b class="red-text">-3🏅</b>');
    chron(retreat?`「${ct.name}」에서 후퇴했다.`:`「${ct.name}」 의뢰에 실패했다.`);
    SFX.lose();
  }
  if(injuredNames.length) lines.push(`부상: <b class="red-text">${injuredNames.join(', ')}</b> (며칠간 출전 불가)`);
  if(deadNames.length) lines.push(`💀 전사: <b class="red-text">${deadNames.join(', ')}</b> — 철인 규칙으로 영원히 떠났다`);
  levelUps.forEach(t=>lines.push(`<b class="gold-text">⬆ ${t}</b>`));
  if(levelUps.length) SFX.levelup();
  checkAchs();

  // 최종전 승리 → 엔딩
  if(victory && ct.final){
    S.won = true;
    chron('검은 군단이 무너졌다. 군단주 카르가스는 재가 되어 흩어졌다.', '에필로그 — 전설');
    save(); saveMeta();
    return showEnding();
  }
  S.contracts = S.contracts.filter(c=>c!==ct);
  const box = $('#result-box');
  box.className = 'result-box panel ' + (victory?'victory':'defeat');
  box.innerHTML = `
    <h2>${victory?'⚔ 승리':'🏴 '+(retreat?'후퇴':'패배')}</h2>
    <p class="sub">${ct.place} — ${ct.name}</p>
    <ul class="result-list">${lines.map(l=>`<li>${l}</li>`).join('')}</ul>
    <button class="btn gold block" onclick="G.afterBattle()">본진으로 귀환 (하루 경과)</button>`;
  show('#screen-result');
  save();
  // 유물 발견 (승리 시)
  if(victory && Math.random() < (ct.tier>=3?0.5:0.35)) whenModalFree(offerRelic);
}
function whenModalFree(fn){
  if(!$('#modal-root').classList.contains('on')) return fn();
  const t = setInterval(()=>{
    if(!$('#modal-root').classList.contains('on')){ clearInterval(t); fn(); }
  }, 300);
}
function offerRelic(){
  const unowned = RELICS.filter(r=>!S.relics.includes(r.id));
  if(!unowned.length) return;
  const offers = [];
  const pool = unowned.slice();
  while(offers.length<3 && pool.length){ offers.push(pool.splice(rnd(pool.length),1)[0]); }
  openModal(`
    <h3>🏺 전장의 유물</h3>
    <p class="modal-sub">잔해 속에서 오래된 물건을 발견했다. 하나를 골라라 — 이번 연대기 동안 부대 전체에 효과가 지속된다.</p>
    <div class="pick-list">
      ${offers.map(r=>`<button class="pick-item" onclick="G.pickRelic('${r.id}')">
        <span class="pi-face">${r.icon}</span>
        <span><b>${r.name}</b><br><span class="pi-meta">${r.desc}</span></span>
      </button>`).join('')}
    </div>`, true);
}
G.pickRelic = function(id){
  const r = RELICS.find(x=>x.id===id); if(!r || S.relics.includes(id)) return;
  S.relics.push(id);
  chron(`유물 「${r.name}」을(를) 손에 넣었다 — ${r.desc}`);
  closeModal();
  toast(`🏺 ${r.name} 획득!`);
  SFX.coin();
  checkAchs();
  save();
};
G.afterBattle = function(){
  SFX.click();
  advanceDay();
  show('#screen-hub');
  switchTab('contracts');
};

/* ---------- 하루 경과 ---------- */
function advanceDay(){
  S.day++;
  const R = relicMods();
  const wage = S.roster.reduce((a,m)=>a+mercWage(m),0);
  if(wage>0){
    if(S.gold>=wage){ S.gold-=wage; }
    else {
      S.gold=0; addRep(-2);
      chron('급여를 지불하지 못했다. 단원들의 눈빛이 차가워진다. (명성 -2)');
      toast('급여 체불! 명성 -2', true);
    }
  }
  const need = Math.max(0, S.roster.reduce((a,m)=>a+mercFood(m),0) - R.foodSave);
  if(need>0){
    if(S.food>=need){ S.food-=need; }
    else {
      S.food=0;
      S.roster.forEach(m=>{ m.hp=Math.max(1, m.hp-4); });
      chron('식량이 떨어졌다. 굶주린 부대의 사기가 바닥이다. (전원 체력 -4)');
      toast('식량 부족! 전원 체력 -4', true);
    }
  }
  S.roster.forEach(m=>{
    if(m.injury>0){
      m.injury--;
      if(m.injury<=0){ m.hp=Math.max(m.hp, Math.floor(mercStats(m).hp*0.5)); chron(`${m.name}이(가) 부상에서 회복했다.`); }
    } else {
      m.hp = clamp(m.hp + Math.ceil(mercStats(m).hp*0.34) + R.morningHeal, 1, mercStats(m).hp);
    }
  });
  genContracts();
  genCandidates();
  // 구제 (전멸+파산 소프트락 방지)
  if(S.roster.length===0 && S.gold<80 && S.day-S.lastAidDay>3){
    S.lastAidDay = S.day;
    S.gold += 120;
    chron('재의 여울 촌장이 지원금 120골드를 보내왔다. "다시 일어서게, 대장."');
    toast('촌장의 지원금 +120🪙');
  }
  if(Math.random()<0.32) showEvent(pick(EVENTS));
  checkAchs();
  save();
}
function showPersonalStory(m){
  m.storyDone = true;
  window.__storyMerc = m;
  openModal(`

    <div class="pick-list">
      <button class="pick-item" onclick="G.storyChoice(0)"><span class="pi-face">🤝</span><span><b>어깨를 두드린다</b><br><span class="pi-meta">"잘 왔다." — 경험치 +40</span></span></button>
      <button class="pick-item" onclick="G.storyChoice(1)"><span class="pi-face">⚔️</span><span><b>"과거는 검으로 증명해라"</b><br><span class="pi-meta">각오가 굳는다 — ${m.trait?'최대 체력 +6':'새로운 특성을 얻는다'}</span></span></button>

}
G.storyChoice = function(i){
  const m = window.__storyMerc; if(!m) return;

    else { m.bonusHp = (m.bonusHp||0)+6; m.hp += 6; chron(`${m.name}의 각오가 몸을 단련시켰다. (최대 체력 +6)`); toast(`${m.name} — 최대 체력 +6`); }
  }

function showEvent(ev){
  if(ev.auto){
    const msg = ev.choices[0].fx(S);
    chron(`[${ev.title}] ${msg}`);
    openModal(`
      <h3>🎲 ${ev.title}</h3>
      <p style="color:var(--ink-dim)">${ev.text}</p>
      <p style="font-weight:700">${msg}</p>
      <div class="modal-actions"><button class="btn gold" onclick="G.closeModal();G.rerender()">확인</button></div>`, true);
    return;
  }
  window.__evt = ev;
  openModal(`
    <h3>🎲 ${ev.title}</h3>
    <p style="color:var(--ink-dim)">${ev.text}</p>
    <div class="pick-list">
      ${ev.choices.map((ch,i)=>{
        const ok = !ch.can || ch.can(S);
        return `<button class="pick-item" ${ok?'':'disabled'} onclick="G.eventChoice(${i})">${ch.label}${ok?'':' (조건 부족)'}</button>`;
      }).join('')}
    </div>`, true);
}
G.eventChoice = function(i){
  const ev = window.__evt; if(!ev) return;
  const ch = ev.choices[i];
  if(ch.can && !ch.can(S)) return;
  closeModal(); // 효과(fx)가 스토리 모달을 열 수 있으므로 먼저 닫는다
  const msg = ch.fx(S);
  chron(`[${ev.title}] ${msg}`);
  toast(msg);
  renderHub();
};
G.rerender = ()=>renderHub();

function showHelp(){
  openModal(`
    <h3>❔ 용병단 운영 지침</h3>

      <p><b class="gold-text">목표</b> — 명성 80을 쌓아 최종 의뢰 <b>「검은 군단 본진 섬멸」</b>을 완수하라.</p>

/* ---------- 엔딩 ---------- */
function showEnding(){
  const st = S.stats;
  const gradeInfo = st.fallen===0 ? ['S','불패의 전설',6] : st.fallen<=3 ? ['A','위대한 지휘관',5] : st.fallen<=8 ? ['B','역전의 용병대장',4] : ['C','상처뿐인 영광',3];
  const chalBonus = S.challenges.reduce((a,id)=>{ const c=CHALLENGES.find(x=>x.id===id); return a+(c?c.legacy:0); },0);
  let legacyGain = 0;
  if(!S.legacyAwarded){
    legacyGain = gradeInfo[2] + chalBonus;
    M.legacy += legacyGain;
    M.endings = (M.endings||0)+1;
    S.legacyAwarded = true;
    unlockAch('ending');
    if(gradeInfo[0]==='S') unlockAch('grade_s');
    if(S.challenges.length) unlockAch('iron_end');
    saveMeta(); save();
  }
  $('#ending-box').innerHTML = `
    <div class="title-emblem">👑</div>
    <h2 class="serif" style="color:var(--gold-soft);font-size:32px;margin:0 0 8px">전설이 되다</h2>
    <p style="font-family:var(--serif);color:var(--ink-dim);line-height:1.9;max-width:44ch;margin:0 auto">
      몰락한 왕성 위로 아침 해가 떠올랐다. 군단주 카르가스는 재가 되어 흩어지고,
      <b class="gold-text">${S.company}</b>의 깃발이 폐허 위에 꽂혔다.<br><br>
      음유시인들은 노래할 것이다 — 쥐잡기 의뢰로 시작해 왕국을 구한 용병단의 이야기를.
      그대의 연대기는 이제 역사가 되었다.</p>
    <div class="ending-stats">
      <div class="panel"><b>${S.day}일</b><span>여정의 길이</span></div>
      <div class="panel"><b>${st.wins}/${st.battles}</b><span>전투 승리</span></div>
      <div class="panel"><b>${fmt(st.goldEarned)}</b><span>벌어들인 골드</span></div>
      <div class="panel"><b>${st.kills}</b><span>처치한 적</span></div>
      <div class="panel"><b>${gradeInfo[0]}</b><span>${gradeInfo[1]}</span></div>
      <div class="panel"><b>+${legacyGain||0} ✦</b><span>획득한 유산${S.challenges.length?` (도전 +${chalBonus})`:''}</span></div>
    </div>
    <div style="display:flex;gap:10px;flex-direction:column">
      <button class="btn gold block" onclick="G.freePlay()">⚔ 자유 용병 생활 계속하기</button>
      <button class="btn block" onclick="G.newChronicle()">📜 새로운 연대기 시작 (유산 유지)</button>
    </div>`;
  show('#screen-ending');
  SFX.win();
}

};

/* ---------- 시작 ---------- */
function startNewGame(name, challenges){
  S = newState(name || '이름 없는 용병단', challenges);
  mercSeq = 1; contractSeq = 1;
  M.runs++; saveMeta();
  const w = makeMerc('warrior'); const a = makeMerc('archer');
  S.roster.push(w, a);
  genContracts();
  genCandidates();
  checkStory();
  chron(`${S.company}, 재의 여울에서 창단. ${w.name}과 ${a.name}이 첫 단원이 되었다.`);
  if(challenges&&challenges.length) chron(`도전 규칙: ${challenges.map(id=>CHALLENGES.find(c=>c.id===id).name).join(', ')}`);
  save();
  show('#screen-hub');
  switchTab('roster');
  if(M.bgm) BGM.start();
  setTimeout(showHelp, 350);
}
function initTitle(){
  const has = !!load();
  $('#btnContinue').style.display = has?'':'none';
  $('#title-meta').textContent = M.runs>0 ? `유산 ${M.legacy} ✦ · 엔딩 ${M.endings||0}회 · 업적 ${Object.keys(M.ach).length}/${ACHS.length}` : '';
}
function askChallenges(name){
  window.__chalSel = [];
  openModal(`
    <h3>⚑ 도전 규칙 (선택)</h3>
    <p class="modal-sub">규칙을 켤수록 어려워지지만, 엔딩 시 유산(✦)을 추가로 얻는다. 원치 않으면 그냥 시작해도 된다.</p>
    <div class="pick-list">
      ${CHALLENGES.map(c=>`<button class="pick-item" data-cid="${c.id}" onclick="G.toggleChal(this)">
        <span class="pi-face">${c.icon}</span>
        <span><b>${c.name}</b> <span class="gold-text" style="font-size:11px">+${c.legacy}✦</span><br><span class="pi-meta">${c.desc}</span></span>
      </button>`).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn gold" onclick="G.startWithChals()">이 규칙으로 시작</button>
    </div>`, true);

}
G.toggleChal = function(el){

};
G.startWithChals = function(){
  const sel = $$('#modal-body .pick-item.selected').map(el=>el.dataset.cid);

$('#btnNew').addEventListener('click', ()=>{
  SFX.click();
  if(M.bgm) BGM.start();

    openModal(`
      <h3>⚠ 진행 중인 연대기</h3>

        <button class="btn" onclick="G.closeModal()">취소</button>

  go();
});
$('#btnContinue').addEventListener('click', ()=>{
  SFX.click();
  const s = load();
  if(!s) return toast('저장 데이터가 없다', true);

initTitle();
